services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    image: sellervai-web:latest
    container_name: sellervai-web
    restart: unless-stopped
    ports:
      - "3004:3004"
    # Secrets are read at runtime from the .env file on the VPS host —
    # never baked into the image (see .dockerignore).
    env_file:
      - .env
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3004/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
